services:
  backend:
    build: .
    image: pv-case-review-backend:local
    ports:
      - "8080:8080"
    restart: "no"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      start_period: 20s
      retries: 3
